runtime: nodejs22

instance_class: F1

automatic_scaling:
  max_instances: 5

handlers:
  # Static assets with caching
  - url: /(assets|locales|images)/(.+)
    static_files: dist/\1/\2
    upload: dist/(assets|locales|images)/(.+)
    expiration: "7d"

  # Well-known and other root files
  - url: /((?:favicon|manifest|version|metadata|apple-touch-icon)\..+)
    static_files: dist/\1
    upload: dist/((?:favicon|manifest|version|metadata|apple-touch-icon)\..+)

  # Catch-all for SPA routing
  - url: /.*
    static_files: dist/index.html
    upload: dist/index.html
