runtime: nodejs22

instance_class: F1

automatic_scaling:
  max_instances: 5

handlers:
  # Static assets with caching
  - url: /assets
    static_dir: dist/assets
    expiration: "30d"

  - url: /locales
    static_dir: dist/locales
    expiration: "1d"

  - url: /images
    static_dir: dist/images
    expiration: "7d"

  # PWA and root static files
  - url: /(.*\.(json|ico|png|webmanifest|txt|xml))$
    static_files: dist/\1
    upload: dist/.*\.(json|ico|png|webmanifest|txt|xml)$

  # Catch-all for React Router SPA
  - url: /.*
    static_files: dist/index.html
    upload: dist/index.html
