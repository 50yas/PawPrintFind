runtime: nodejs22

instance_class: F1

automatic_scaling:
  max_instances: 5

handlers:
  # Static assets with caching
  - url: /assets
    static_dir: dist/assets
    expiration: "30d"

  - url: /locales
    static_dir: dist/locales
    expiration: "1d"

  - url: /images
    static_dir: dist/images
    expiration: "7d"

  # PWA and root files
  - url: /(.*\.(json|webmanifest|ico|png|svg|txt))$
    static_files: dist/\1
    upload: dist/(.*\.(json|webmanifest|ico|png|svg|txt))$

  # SPA Catch-all: Route all other requests to index.html for client-side routing
  - url: /.*
    static_files: dist/index.html
    upload: dist/index.html
