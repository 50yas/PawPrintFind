    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {

              input: "var(--input)",
              ring: "var(--ring)",
              background: "var(--background)",
              foreground: "var(--foreground)",
              primary: {
                DEFAULT: "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },

              },
            },
            animation: {
              'marquee': 'marquee 25s linear infinite',
            },

            }
          }
        }

    <style>
      :root {
        --primary: 191 100% 50%; /* #00D2FF - Gemini Teal */
        --primary-foreground: 0 0% 100%;
        --secondary: 37 100% 59%; /* #FFB02E - Safety Amber */
        --secondary-foreground: 0 0% 100%;
        --background: #020617; /* Even deeper slate */
        --foreground: #F8FAFC;
        --card: rgba(15, 23, 42, 0.4); /* More translucent */
        --card-foreground: #F8FAFC;
        --card-border: rgba(255, 255, 255, 0.08);
        --muted: rgba(30, 41, 59, 0.3);
        --muted-foreground: #94A3B8;
        --border: rgba(255, 255, 255, 0.1);
        --ring: 191 100% 50%;
        --radius: 1.5rem; /* Larger radius for premium feel */
        --scanline-color: rgba(0, 210, 255, 0.03);
      }

      .dark {
        --primary: 191 100% 50%;
        --secondary: 37 100% 59%;
        --background: #050810;
        --card: rgba(10, 15, 28, 0.8);
        --border: rgba(0, 210, 255, 0.2);
      }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--background);
        color: var(--foreground);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      .font-mono-tech { font-family: 'Space Mono', monospace; }

      .glass-panel {
        background-color: var(--card);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--card-border);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }

      /* Enhanced Textbox Styling */
      .input-base, .input-enhanced {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(0, 210, 255, 0.2);
        color: #F8FAFC;
        border-radius: 0.75rem;
        padding: 0.75rem 1rem;
        transition: all 0.3s ease;
        outline: none;
        width: 100%;
      }

      .input-base:focus, .input-enhanced:focus {
        border-color: hsl(var(--primary));
        background: rgba(15, 23, 42, 0.9);
        box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
      }

      .input-base::placeholder, .input-enhanced::placeholder {
        color: #64748b;
        opacity: 0.8;
      }
      
      .bg-scanlines {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
        background: linear-gradient(
          to bottom,
          transparent,
          transparent 50%,
          var(--scanline-color) 50%,
          var(--scanline-color)
        );
        background-size: 100% 3px;
        opacity: 0.6;
      }

      .btn-primary {
        background: linear-gradient(135deg, hsl(var(--primary)) 0%, #0099ff 100%);
        box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
      }

      .btn-primary:hover {
        box-shadow: 0 0 30px rgba(0, 210, 255, 0.5);
        transform: translateY(-1px);
      }

      .text-glow { text-shadow: 0 0 15px rgba(0, 210, 255, 0.6); }
      .border-glow { box-shadow: 0 0 15px rgba(0, 210, 255, 0.15); }
      
      /* Safe Area padding utility */
      .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
      .pt-safe-top { padding-top: env(safe-area-inset-top, 20px); }
    </style>
